<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Tracker - PRO Build</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  html, body { margin: 0; height: 100%; font-family: Arial, sans-serif; background: #1a1a1a; }
  #map { height: 100%; width: 100%; }

  /* PANEEL */
  #panel {
    position: absolute; top: 0; right: 0; height: 100%; width: 75px; 
    background: rgba(30, 30, 30, 0.9); color: white; transition: width 0.3s;
    z-index: 1000; overflow-x: hidden; overflow-y: auto; backdrop-filter: blur(10px);
    box-shadow: -2px 0 15px rgba(0,0,0,0.5);
  }
  #panel.open { width: 340px; } /* Tegin veidi laiemaks, et uus info ära mahuks */

  #mini { padding: 20px 10px; text-align: center; cursor: pointer; border-bottom: 1px solid #444; }
  .stat { margin: 15px 0; font-size: 14px; font-weight: bold; }
  
  .mini-label { font-size: 10px; color: #aaa; margin-bottom: 2px; }

  /* PROGRESS BAR */
  .progress { width: 100%; height: 10px; background: #444; border-radius: 5px; overflow: hidden; margin-top: 2px; }
  .progressBar { height: 100%; background: #4caf50; width: 0%; transition: width 0.5s, background-color 0.5s; }

  #panelContent { padding: 20px; display: none; }
  #panel.open #panelContent { display: block; }

  /* UUS: LISASTAATUSE GRID */
  .statsGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .sg-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #333; }
  .sg-label { font-size: 10px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
  .sg-val { font-size: 15px; font-weight: bold; color: #2196F3; }

  /* GRAAFIK */
  .graphBox { background: #000; padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
  #batteryChart { width: 100% !important; height: 180px !important; }
  
  .graphHeader { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px; color: #888; }
  #batteryStats { color: #4caf50; font-weight: bold; }

  /* SLAIDERID */
  .sliderBox { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #333; }
  .sliderBox h3 { margin: 0 0 10px 0; font-size: 14px; color: #aaa; text-transform: uppercase; }
  input[type=range] { width: 100%; cursor: pointer; accent-color: #4caf50; }
  
  #pointCount, #timeIndicator { text-align: center; margin-top: 10px; font-weight: bold; font-size: 13px; }
  #timeIndicator { color: #2196F3; }
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <div id="mini">
    <div class="stat" id="clock">--:--</div>
    
    <div class="stat">
      <div class="mini-label">OLEK</div>
      <div id="statusText" style="margin-top:2px; font-size: 12px; font-weight: bold; color: #888;">--</div>
    </div>

    <div class="stat">
      <div class="mini-label">AKU</div>
      <div class="progress"><div class="progressBar" id="batteryBar"></div></div>
      <div id="batteryPercent" style="margin-top:2px; font-size: 12px;">--%</div>
    </div>
    
    <div class="stat">
      <div class="mini-label">LEVI (CSQ)</div>
      <div class="progress"><div class="progressBar" id="signalBar"></div></div>
      <div id="signalText" style="margin-top:2px; font-size: 12px;">-- / 31</div>
    </div>
  </div>

  <div id="panelContent">
    <div class="statsGrid">
      <div class="sg-item">
        <div class="sg-label">Kiirus</div>
        <div class="sg-val" id="valSpeed">-- km/h</div>
      </div>
      <div class="sg-item">
        <div class="sg-label">Kõrgus</div>
        <div class="sg-val" id="valAlt">-- m</div>
      </div>
      <div class="sg-item">
        <div class="sg-label">Satelliidid (Otsib/Fix)</div>
        <div class="sg-val" id="valSat">-- / --</div>
      </div>
      <div class="sg-item">
        <div class="sg-label">Toite Allikas</div>
        <div class="sg-val" id="valCharge" style="color:#ff9800; font-size: 12px;">--</div>
      </div>
    </div>

    <div class="graphBox">
      <div class="graphHeader">
        <span>Aku pinge (48h)</span>
        <span id="batteryStats">Min: -- | Max: --</span>
      </div>
      <canvas id="batteryChart"></canvas>
    </div>

    <div class="sliderBox">
      <h3>Saba pikkus: <span id="pointCount">50</span> punkti</h3>
      <input type="range" id="pointSlider" min="1" max="200" value="50">
    </div>

    <div class="sliderBox">
      <h3>Aja kerimine</h3>
      <div id="timeIndicator">Valitud aeg: --:--</div>
      <input type="range" id="timeSlider">
    </div>
    
    <div style="font-size: 10px; color: #555; margin-top: 20px; text-align: center;">
      Andmete värskendamine: 20s
    </div>
  </div>
</div>

<script>
/* SEADED */
const FETCH_LIMIT = 1500; 
const API_URL = "https://script.google.com/macros/s/AKfycbzS5a7DaAP_dYJdg7-aJ_gAX6HNQsM0u4vOszeojYKGKuIadNiEhLoFBaWTEU8r9xKY/exec?api=points&points=" + FETCH_LIMIT;

/* GLOBAALNE STAATUS */
let rawPoints = [];
let trailLength = 50;
let currentIndex = 0;
let marker = null;
let routeLine = null;
let batteryChartInstance = null;

/* MAP INIT */
let map = L.map('map', { zoomControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
map.setView([58.6, 25.0], 7);

/* PANEELI AVAMINE */
document.getElementById("mini").onclick = () => document.getElementById("panel").classList.toggle("open");

/* KELL PANEELIL */
setInterval(() => {
  document.getElementById("clock").innerHTML = new Date().toLocaleTimeString('et-EE', {hour12: false});
}, 1000);

/* SLAIDERID */
const pSlider = document.getElementById("pointSlider");
const tSlider = document.getElementById("timeSlider");

pSlider.oninput = function() {
  trailLength = parseInt(this.value);
  document.getElementById("pointCount").innerHTML = trailLength;
  updateUI(false); 
};
pSlider.onchange = () => updateUI(true);

tSlider.oninput = function() {
  currentIndex = parseInt(this.value);
  updateUI(false);
};
tSlider.onchange = () => updateUI(true);

/* ANDMETE LAADIMINE */
async function loadData(isAutoUpdate = false) {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    if (!data || data.length === 0) return;

    rawPoints = data.filter(p => p.lat && p.lon);
    
    const oldMax = tSlider.max;
    const oldVal = tSlider.value;
    tSlider.max = rawPoints.length - 1;

    if (!isAutoUpdate || oldVal == oldMax) {
      tSlider.value = rawPoints.length - 1;
      currentIndex = rawPoints.length - 1;
      updateUI(true);
    }
    
    drawBatteryChart();
  } catch (e) {
    console.error("Viga andmetega:", e);
  }
}

/* UI UUENDAMINE */
function updateUI(useOSRM = true) {
  if (rawPoints.length === 0) return;
  const current = rawPoints[currentIndex];

  // KELLAAEG
  const t = new Date(current.time || current.timestamp || current.devicetime);
  document.getElementById("timeIndicator").innerHTML = t.toLocaleString('et-EE');
  
  // ================= UUS: OLEKU TÕLKIMINE =================
  let rawStatus = (current.status || "--").replace(/_/g, " "); // Eemaldame alakriipsud
  let stEl = document.getElementById("statusText");
  
  if (rawStatus.includes("Moving")) {
    stEl.innerHTML = "LIIGUB";
    stEl.style.color = "#4caf50";
  } else if (rawStatus.includes("Stationary")) {
    stEl.innerHTML = "PAIGAL";
    stEl.style.color = "#ff9800";
  } else if (rawStatus.includes("No GPS") || rawStatus.includes("No Fix")) {
    stEl.innerHTML = "NO FIX";
    stEl.style.color = "#f44336";
  } else {
    stEl.innerHTML = rawStatus;
    stEl.style.color = "#888";
  }

  // ================= UUS: DETAILANDMED =================
  document.getElementById("valSpeed").innerHTML = (current.speed || "0") + " km/h";
  document.getElementById("valAlt").innerHTML = (current.alt || "0") + " m";
  document.getElementById("valSat").innerHTML = (current.sat_v || "0") + " / " + (current.sat_u || "0");
  
  let chargeStr = (current.charging || "--").replace(/_/g, " ");
  document.getElementById("valCharge").innerHTML = chargeStr;

  // ================= AKU (PROTSENT JA LAADIMINE) =================
  // Uus kood saadab 'batpct', aga igaks juhuks teeme ka manuaalse arvutuse
  let pct = parseInt(current.batpct);
  if (isNaN(pct)) {
    const v = current.battery || current.bat || current.bat_v || 0;
    const volt = v > 100 ? v / 1000 : v;
    pct = ((volt - 3.3) / (4.2 - 3.3)) * 100;
  }
  pct = Math.max(0, Math.min(100, pct));
  
  let batBar = document.getElementById("batteryBar");
  batBar.style.width = pct + "%";
  if (pct > 50) batBar.style.backgroundColor = "#4caf50";
  else if (pct > 20) batBar.style.backgroundColor = "#ff9800";
  else batBar.style.backgroundColor = "#f44336";
  
  // Lisame välgunoole, kui seade laeb
  let isCharging = chargeStr.toLowerCase().includes("charg") || chargeStr.toLowerCase().includes("usb");
  document.getElementById("batteryPercent").innerHTML = (isCharging ? "⚡ " : "") + pct.toFixed(0) + "%";
  
  // ================= LEVI (CSQ) =================
  let sigVal = parseInt(current.csq || current.signal || 0);
  let sBar = document.getElementById("signalBar");
  let sText = document.getElementById("signalText");

  if (sigVal === 99 || isNaN(sigVal) || sigVal === 0) {
      sBar.style.width = "0%";
      sBar.style.backgroundColor = "#f44336";
      sText.innerHTML = "Puudub";
  } else {
      let sigPct = (sigVal / 31) * 100;
      sigPct = Math.max(0, Math.min(100, sigPct));
      
      sBar.style.width = sigPct + "%";
      if (sigVal > 20) sBar.style.backgroundColor = "#4caf50"; 
      else if (sigVal > 10) sBar.style.backgroundColor = "#ff9800"; 
      else sBar.style.backgroundColor = "#f44336"; 
      
      sText.innerHTML = sigVal + " / 31"; // Kuvame nüüd CSQ väärtuse 0-31
  }

  // ================= KAART =================
  const start = Math.max(0, currentIndex - trailLength + 1);
  const points = rawPoints.slice(start, currentIndex + 1);
  drawMap(points, useOSRM);
}

/* OSRM ROUTE (GeoJSON loogika jäi puutumata) */
async function drawMap(points, useOSRM) {
  if (routeLine) map.removeLayer(routeLine);
  if (points.length === 0) return;

  let latlngs = points.map(p => [p.lat, p.lon]);

  if (useOSRM && points.length > 1) {
    try {
      let uniquePoints = [];
      for(let i=0; i<points.length; i++) {
          if(i===0 || points[i].lat !== points[i-1].lat || points[i].lon !== points[i-1].lon) {
              uniquePoints.push(points[i]);
          }
      }
      let segment = uniquePoints.slice(-50); 
      if(segment.length > 1) {
          const coords = segment.map(p => p.lon + "," + p.lat).join(";");
          const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson&continue_straight=false`);
          const data = await res.json();
          if (data.code === "Ok" && data.routes && data.routes.length > 0) {
            latlngs = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
          }
      }
    } catch(e) { console.warn("OSRM viga:", e); }
  }

  routeLine = L.polyline(latlngs, { color: '#2196F3', weight: 5, opacity: 0.8, lineJoin: 'round' }).addTo(map);
  const last = points[points.length - 1];
  if (!marker) marker = L.marker([last.lat, last.lon]).addTo(map);
  else marker.setLatLng([last.lat, last.lon]);

  if (currentIndex == tSlider.max) map.setView([last.lat, last.lon]);
}

/* GRAAFIKU JOONISTAMINE */
function drawBatteryChart() {
  const ctx = document.getElementById("batteryChart").getContext('2d');
  if (batteryChartInstance) batteryChartInstance.destroy();

  const labels = [];
  const data = [];
  let minV = 5.0, maxV = 0;
  const limit48h = Date.now() - (48 * 60 * 60 * 1000);

  rawPoints.forEach(p => {
    const time = new Date(p.time || p.timestamp || p.devicetime).getTime();
    if (time > limit48h) {
      // Arvestame uute väljanimedega (bat, battery, jne)
      let v = p.bat || p.battery || p.vbat || 0;
      let volt = v > 100 ? v / 1000 : v;
      if (volt > 2.0 && volt < 5.0) {
        labels.push(""); 
        data.push(volt);
        if (volt < minV) minV = volt;
        if (volt > maxV) maxV = volt;
      }
    }
  });

  if (data.length > 0) {
    document.getElementById("batteryStats").innerHTML = `Min: ${minV.toFixed(2)}V | Max: ${maxV.toFixed(2)}V`;
  }

  batteryChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        data: data,
        borderColor: '#4caf50',
        borderWidth: 1.5,
        pointRadius: 0,
        fill: false,
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      scales: {
        x: { display: false },
        y: { 
          min: 3.0, 
          max: 4.5, 
          ticks: { color: '#666', stepSize: 0.25 },
          grid: { color: '#222' }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

loadData();
setInterval(() => loadData(true), 20000);
</script>
</body>
</html>
