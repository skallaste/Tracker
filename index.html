<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Tracker</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

html,body{
margin:0;
height:100%;
font-family:Arial;
}

#map{
height:100%;
width:100%;
}

#panel{
position:absolute;
top:0;
right:0;
height:100%;
width:60px;
background:#222;
color:white;
transition:0.3s;
z-index:1000;
overflow:hidden;
}

#panel.open{
width:320px;
}

#mini{
padding:10px;
text-align:center;
cursor:pointer;
}

.stat{
margin:10px 0;
}

.progress{

width:100%;
height:10px;
background:#555;
border-radius:5px;
overflow:hidden;

}

.progressBar{

height:100%;
background:#4caf50;
width:0%;

}

#panelContent{
padding:15px;
display:none;
}

#panel.open #panelContent{
display:block;
}

#batteryChart{
width:100%;
height:200px;
}

.sliderBox{
margin-top:20px;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="panel">

<div id="mini">

<div class="stat" id="clock">--:--</div>

<div class="stat">

<div class="progress">
<div class="progressBar" id="batteryBar"></div>
</div>

<div id="batteryPercent">--%</div>

</div>

<div class="stat" id="signal">📶 --</div>

</div>

<div id="panelContent">

<h3>Battery</h3>

<canvas id="batteryChart"></canvas>

<div class="sliderBox">

<h3>Punktide arv</h3>

<input type="range"
id="pointSlider"
min="1"
max="500"
value="100"
style="width:100%">

<div id="pointCount">100</div>

</div>

</div>

</div>

<script>

/* API */

let pointLimit=100;

const API_BASE=
"https://script.google.com/macros/s/AKfycbz8VQ5E_QMY-g0vB8lDq254fKsRhqArHqO0MljJfE8Gg8Kd_UVPvFLMoLlqUjVxSJ604g/exec?api=points&points=";


/* MAP */

let map=L.map('map');

let estoniaBounds=[
[57.5,21.5],
[59.8,28.2]
];

map.fitBounds(estoniaBounds);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);


/* PANEL */

document.getElementById("mini").onclick=()=>{
document.getElementById("panel").classList.toggle("open");
};


/* CLOCK */

setInterval(()=>{

let t=new Date();

document.getElementById("clock").innerHTML=
t.toLocaleTimeString();

},1000);


/* SLIDER */

let slider=document.getElementById("pointSlider");

slider.oninput=function(){

pointLimit=this.value;
document.getElementById("pointCount").innerHTML=pointLimit;

};

slider.onchange=function(){
loadData();
};


/* GLOBAL */

let rawPoints=[];
let snapped=[];
let marker;
let routeLine;


/* LOAD DATA */

loadData();

async function loadData(){

let API=API_BASE+pointLimit;

let res=await fetch(API);

rawPoints=await res.json();

if(rawPoints.length<2)return;

await snapRoute();

drawRoute();

updateMini();

drawBattery();

animateMarker();

}


/* SNAP ROUTE */

async function snapRoute(){

try{

let coords=rawPoints
.map(p=>p.lon+","+p.lat)
.join(";");

let url=
"https://router.project-osrm.org/match/v1/driving/"
+coords+
"?overview=full&geometries=geojson";

let res=await fetch(url);

let data=await res.json();

if(data.code==="Ok"){

snapped=data.matchings[0].geometry.coordinates;

}else{

fallbackRoute();

}

}catch(e){

fallbackRoute();

}

}


/* FALLBACK */

function fallbackRoute(){

snapped=rawPoints.map(p=>[p.lon,p.lat]);

}


/* DRAW ROUTE */

function drawRoute(){

if(routeLine){
map.removeLayer(routeLine);
}

let latlngs=snapped.map(c=>[c[1],c[0]]);

routeLine=L.polyline(latlngs,{
color:"red",
weight:4
}).addTo(map);

marker=L.marker(latlngs[0]).addTo(map);

let last=rawPoints[rawPoints.length-1];

map.setView([last.lat,last.lon],15);

}


/* MARKER ANIMATION */

function animateMarker(){

let latlngs=snapped.map(c=>[c[1],c[0]]);

let i=0;

setInterval(()=>{

if(i>=latlngs.length)return;

marker.setLatLng(latlngs[i]);

i++;

},200);

}


/* MINI PANEL */

function updateMini(){

let last=rawPoints[rawPoints.length-1];

let v=last.battery;

let percent=((v-3.3)/(4.2-3.3))*100;

percent=Math.max(0,Math.min(100,percent));

document.getElementById("batteryBar").style.width=
percent+"%";

document.getElementById("batteryPercent").innerHTML=
percent.toFixed(0)+"%";

document.getElementById("signal").innerHTML=
"📶 "+last.signal;

}


/* BATTERY GRAPH */

function drawBattery(){

let ctx=document.getElementById("batteryChart");

let labels=[];
let data=[];

rawPoints.forEach(p=>{

labels.push(new Date(p.time).toLocaleTimeString());
data.push(p.battery);

});

new Chart(ctx,{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Battery",
data:data
}]
}

});

}

</script>

</body>
</html>
