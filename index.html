<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
margin:0;
height:100%;
font-family:Arial;
}

#map{
height:100%;
width:100%;
}

/* PAREM PANEEL */

#panel{
position:absolute;
right:0;
top:0;
height:100%;
width:65px;
background:rgba(30,30,30,0.6);
color:white;
transition:0.3s;
overflow:hidden;
z-index:1000;
}

#panel.open{
width:320px;
}

/* KINNINE RIBA */

#header{
padding:8px;
cursor:pointer;
}

#clock{
font-size:16px;
margin-bottom:8px;
}

#batteryBar{
height:10px;
background:#444;
border-radius:5px;
overflow:hidden;
}

#batteryFill{
height:100%;
background:#4caf50;
width:0%;
}

#signal{
margin-top:6px;
font-size:12px;
}

/* AVATUD PANEEL */

#panelContent{
padding:15px;
display:none;
}

#panel.open #panelContent{
display:block;
}

.slider{
width:100%;
}

label{
font-size:14px;
}

.info{
margin-top:8px;
font-size:13px;
white-space:pre-line;
}

</style>

</head>

<body>

<div id="map"></div>

<div id="panel">

<div id="header" onclick="togglePanel()">

<div id="clock">--:--</div>

<div id="batteryBar">
<div id="batteryFill"></div>
</div>

<div id="signal">📶</div>

</div>

<div id="panelContent">

<label>Ajas tagasi (30 min samm)</label>
<input id="timeSlider" type="range" min="0" max="0" value="0" class="slider">

<div id="timeInfo" class="info"></div>

<br>

<label>Punktide arv</label>
<input id="pointsSlider" type="range" min="1" max="500" value="100" class="slider">

<div id="pointsLabel">100</div>

<br>

<label>Päringu intervall (sek)</label>
<input id="refreshSlider" type="range" min="5" max="60" value="10" class="slider">

<div id="refreshLabel">10</div>

</div>

</div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ========================= */
/* MUUDA AINULT SEDA */
/* ========================= */

const API_URL="AKfycbz8VQ5E_QMY-g0vB8lDq254fKsRhqArHqO0MljJfE8Gg8Kd_UVPvFLMoLlqUjVxSJ604g";

/* ========================= */

let refreshSeconds=10;
let refreshTimer=null;

let map=L.map('map').setView([58.7,25],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let marker=L.marker([58.7,25]).addTo(map);

let routeLine=L.polyline([],{
color:'red',
weight:4
}).addTo(map);

let points=[];

/* ========================= */
/* CLOCK */
/* ========================= */

function updateClock(){

let d=new Date();

let h=String(d.getHours()).padStart(2,"0");
let m=String(d.getMinutes()).padStart(2,"0");

document.getElementById("clock").innerText=h+":"+m;

}

setInterval(updateClock,1000);
updateClock();

/* ========================= */
/* PANEL */
/* ========================= */

function togglePanel(){

document.getElementById("panel").classList.toggle("open");

}

/* ========================= */
/* BATTERY */
/* ========================= */

function batteryPercent(v){

let p=(v-3.3)/(4.2-3.3)*100;

p=Math.max(0,Math.min(100,p));

document.getElementById("batteryFill").style.width=p+"%";

}

/* ========================= */
/* FETCH */
/* ========================= */

async function loadPoints(){

try{

let limit=document.getElementById("pointsSlider").value;

let res=await fetch(API_URL+"&points="+limit);

let data=await res.json();

if(!data.length)return;

points=data;

localStorage.setItem("gps_cache",JSON.stringify(data));

updateMap();

}catch(e){

let cache=localStorage.getItem("gps_cache");

if(cache){

points=JSON.parse(cache);

updateMap();

}

}

}

/* ========================= */
/* ROUTING */
/* ========================= */

async function route(coords){

if(coords.length<2) return coords;

let list=coords.map(c=>c[1]+","+c[0]).join(";");

let url="https://router.project-osrm.org/route/v1/driving/"+list+"?overview=full&geometries=geojson";

let res=await fetch(url);

let data=await res.json();

return data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);

}

/* ========================= */
/* MAP UPDATE */
/* ========================= */

async function updateMap(){

if(points.length==0) return;

let offset=document.getElementById("timeSlider").value;

let index=points.length-1-offset;

if(index<0) index=0;

let selected=points[index];

let count=document.getElementById("pointsSlider").value;

let start=Math.max(0,index-count);

let subset=points.slice(start,index+1);

let coords=subset.map(p=>[p.lat,p.lon]);

let routed=await route(coords);

routeLine.setLatLngs(routed);

marker.setLatLng([selected.lat,selected.lon]);

map.setView([selected.lat,selected.lon],14);

batteryPercent(selected.battery);

document.getElementById("signal").innerText="📶 "+selected.signal;

updateTimeInfo(selected.time,offset);

}

/* ========================= */
/* TIME INFO */
/* ========================= */

function updateTimeInfo(time,offset){

let t=new Date(time);

let h=String(t.getHours()).padStart(2,"0");
let m=String(t.getMinutes()).padStart(2,"0");

let back=offset*30;

document.getElementById("timeInfo").innerText=
"Viimane punkt: "+h+":"+m+
"\nTagasi: "+back+" min";

}

/* ========================= */
/* SLIDERS */
/* ========================= */

document.getElementById("pointsSlider").oninput=function(){

document.getElementById("pointsLabel").innerText=this.value;

updateMap();

};

document.getElementById("refreshSlider").oninput=function(){

refreshSeconds=this.value;

document.getElementById("refreshLabel").innerText=this.value;

startRefresh();

};

document.getElementById("timeSlider").oninput=function(){

updateMap();

};

/* ========================= */
/* SLIDER RANGE */
/* ========================= */

function updateSlider(){

let max=Math.floor(points.length/60);

document.getElementById("timeSlider").max=max;

}

setInterval(updateSlider,5000);

/* ========================= */
/* REFRESH TIMER */
/* ========================= */

function startRefresh(){

if(refreshTimer) clearInterval(refreshTimer);

refreshTimer=setInterval(loadPoints,refreshSeconds*1000);

}

startRefresh();
loadPoints();

</script>

</body>
</html>
