<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  html, body {
    margin: 0;
    height: 100%;
    font-family: Arial, sans-serif;
  }

  #map {
    height: 100%;
    width: 100%;
  }

  /* PANEL */
  #panel {
    position: absolute;
    top: 0;
    right: 0;
    height: 100%;
    width: 75px; 
    background: rgba(30, 30, 30, 0.85);
    color: white;
    transition: width 0.3s ease;
    z-index: 1000;
    overflow-x: hidden;
    overflow-y: auto;
    backdrop-filter: blur(5px);
    box-shadow: -2px 0 10px rgba(0,0,0,0.5);
  }

  #panel.open {
    width: 320px;
  }

  #mini {
    padding: 15px 10px;
    text-align: center;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  #mini:hover {
    background: rgba(255,255,255,0.1);
  }

  .stat {
    margin: 15px 0;
    font-size: 14px;
    font-weight: bold;
  }

  /* BATTERY BAR */
  .progress {
    width: 100%;
    height: 12px;
    background: #555;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 5px;
  }

  .progressBar {
    height: 100%;
    background: #4caf50;
    width: 0%;
    transition: width 0.5s ease, background-color 0.5s;
  }

  /* PANEL CONTENT */
  #panelContent {
    padding: 20px;
    display: none;
  }

  #panel.open #panelContent {
    display: block;
  }

  /* GRAPH & SLIDERS */
  #batteryChart {
    width: 100%;
    height: 180px;
  }
  
  .graphBox {
    background: rgba(0,0,0,0.2);
    padding: 10px;
    border-radius: 8px;
  }

  .graphHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
  }
  
  .graphHeader h3 {
    margin: 0;
    font-size: 14px;
    color: #ccc;
  }

  #batteryStats {
    font-size: 12px;
    color: #4caf50;
    font-weight: bold;
  }

  .sliderBox {
    margin-top: 25px;
    background: rgba(0,0,0,0.2);
    padding: 15px;
    border-radius: 8px;
  }

  .sliderBox h3 {
    margin: 0 0 10px 0;
    font-size: 16px;
    color: #ccc;
  }

  input[type=range] {
    width: 100%;
    cursor: pointer;
  }

  #pointCount, #timeIndicator {
    text-align: center;
    margin-top: 8px;
    font-weight: bold;
    color: #4caf50;
  }

  #timeIndicator {
    font-size: 14px;
    margin-bottom: 10px;
    color: #2196F3;
  }
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <div id="mini">
    <div class="stat" id="clock">--:--</div>
    <div class="stat">
      <div class="progress">
        <div class="progressBar" id="batteryBar"></div>
      </div>
      <div id="batteryPercent">--%</div>
    </div>
    <div class="stat" id="signal">📶 --</div>
  </div>

  <div id="panelContent">
    
    <div class="graphBox">
      <div class="graphHeader">
        <h3>Pinge (viimased 24h)</h3>
        <div id="batteryStats">Min: -- V | Max: -- V</div>
      </div>
      <canvas id="batteryChart"></canvas>
    </div>

    <div class="sliderBox">
      <h3>Saba pikkus (punkte)</h3>
      <input type="range" id="pointSlider" min="1" max="100" value="50">
      <div id="pointCount">50</div>
    </div>

    <div class="sliderBox">
      <h3>Ajas tagasi kerimine</h3>
      <div id="timeIndicator">Hetkeaeg: --:--</div>
      <input type="range" id="timeSlider">
    </div>
  </div>
</div>

<script>
/* SEADED */
const FETCH_LIMIT = 500; 
const API_URL = "https://script.google.com/macros/s/AKfycbz8VQ5E_QMY-g0vB8lDq254fKsRhqArHqO0MljJfE8Gg8Kd_UVPvFLMoLlqUjVxSJ604g/exec?api=points&points=" + FETCH_LIMIT;

/* GLOBAALSED MUUTUJAD */
let rawPoints = [];
let trailLength = parseInt(document.getElementById("pointSlider").value);
let currentIndex = 0;
let marker = null;
let routeLine = null;
let batteryChartInstance = null;

/* MAP INIT */
let map = L.map('map');
let estoniaBounds = [[57.5, 21.5], [59.8, 28.2]];
map.fitBounds(estoniaBounds);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
}).addTo(map);

/* PANEL TOGGLE */
document.getElementById("mini").onclick = () => {
  document.getElementById("panel").classList.toggle("open");
};

/* PÄRISAJA KELL */
setInterval(() => {
  let t = new Date();
  document.getElementById("clock").innerHTML = t.toLocaleTimeString('et-EE', {hour12: false});
}, 1000);

/* SLIDERITE LOOGIKA */
let pointSlider = document.getElementById("pointSlider");
let timeSlider = document.getElementById("timeSlider");

pointSlider.oninput = function() {
  trailLength = parseInt(this.value);
  document.getElementById("pointCount").innerHTML = trailLength;
  drawSelected(false); 
};
pointSlider.onchange = function() {
  drawSelected(true); 
};

timeSlider.oninput = function() {
  currentIndex = parseInt(this.value);
  drawSelected(false); 
};
timeSlider.onchange = function() {
  currentIndex = parseInt(this.value);
  drawSelected(true); 
};

/* LAE ANDMED SERVERIST */
loadData();

async function loadData() {
  try {
    let res = await fetch(API_URL);
    rawPoints = await res.json();
    
    if(rawPoints.length < 1) return;

    timeSlider.min = 0;
    timeSlider.max = rawPoints.length - 1;
    timeSlider.value = rawPoints.length - 1; 
    currentIndex = rawPoints.length - 1;

    drawSelected(true);
    drawBatteryChart(); // Joonistame 24h graafiku
  } catch (error) {
    console.error("Viga andmete laadimisel:", error);
  }
}

/* JOONISTA VALITUD HETK KAARDILE */
async function drawSelected(useOSRM = true) {
  if (rawPoints.length === 0) return;

  let index = currentIndex;
  let currentDataPoint = rawPoints[index];

  let timeObj = new Date(currentDataPoint.time || currentDataPoint.timestamp);
  document.getElementById("timeIndicator").innerHTML = timeObj.toLocaleString('et-EE');

  updateMini(currentDataPoint);

  let startIdx = Math.max(0, index - trailLength + 1);
  let pointsToDraw = rawPoints.slice(startIdx, index + 1);

  await drawRoute(pointsToDraw, useOSRM);
}

/* MARSRUUDI JA MARKERI JOONISTAMINE */
async function drawRoute(points, useOSRM) {
  if (routeLine) {
    map.removeLayer(routeLine);
    routeLine = null;
  }
  
  if (points.length === 0) return;

  let latlngs = [];

  if (useOSRM && points.length > 1 && points.length <= 100) {
    try {
      let coords = points.map(p => p.lon + "," + p.lat).join(";");
      let url = "https://router.project-osrm.org/match/v1/driving/" + coords + "?overview=full&geometries=geojson";
      
      let res = await fetch(url);
      let data = await res.json();
      
      if (data.code === "Ok") {
        let snapped = data.matchings[0].geometry.coordinates;
        latlngs = snapped.map(c => [c[1], c[0]]); 
      } else {
        latlngs = points.map(p => [p.lat, p.lon]);
      }
    } catch(e) {
      latlngs = points.map(p => [p.lat, p.lon]);
    }
  } else {
    latlngs = points.map(p => [p.lat, p.lon]);
  }

  if (latlngs.length > 1) {
    routeLine = L.polyline(latlngs, {
      color: "#F44336",
      weight: 4,
      opacity: 0.8
    }).addTo(map);
  }

  let last = points[points.length - 1];
  let timeStr = new Date(last.time || last.timestamp).toLocaleTimeString('et-EE');
  let popupText = `<b>Aeg:</b> ${timeStr}<br><b>Kiirus:</b> ${last.speed || 0} km/h`;

  if (marker) {
    marker.setLatLng([last.lat, last.lon]);
    if(marker.getPopup()) {
      marker.setPopupContent(popupText);
    } else {
      marker.bindPopup(popupText);
    }
  } else {
    marker = L.marker([last.lat, last.lon]).addTo(map).bindPopup(popupText);
  }

  map.setView([last.lat, last.lon]);
}

/* VÄRSKENDA PANEELI INFOT */
function updateMini(dataPoint) {
  let v = dataPoint.battery || dataPoint.vbat || 0;
  let volt = v > 100 ? v / 1000 : v; 
  
  let percent = ((volt - 3.3) / (4.2 - 3.3)) * 100;
  percent = Math.max(0, Math.min(100, percent)); 

  let bar = document.getElementById("batteryBar");
  bar.style.width = percent + "%";
  
  if(percent > 50) bar.style.backgroundColor = "#4caf50"; 
  else if(percent > 20) bar.style.backgroundColor = "#ff9800"; 
  else bar.style.backgroundColor = "#f44336"; 

  document.getElementById("batteryPercent").innerHTML = percent.toFixed(0) + "%";
  document.getElementById("signal").innerHTML = "📶 " + (dataPoint.signal || "--");
}

/* AKU GRAAFIK (Ainult 24h, peenike joon, min/max filter) */
function drawBatteryChart() {
  let ctx = document.getElementById("batteryChart");

  if (batteryChartInstance) {
    batteryChartInstance.destroy();
  }

  let labels = [];
  let data = [];
  let minVolt = 9.9; // Algne kõrge väärtus, et saaks allapoole tulla
  let maxVolt = 0.0;

  // Arvutame 24 tunni taguse aja
  let now = new Date();
  let limit24h = now.getTime() - (24 * 60 * 60 * 1000);

  rawPoints.forEach(p => {
    let tObj = new Date(p.time || p.timestamp);
    
    // Võtame ainult punktid, mis on uuemad kui 24 tundi
    if (tObj.getTime() >= limit24h) {
      let v = p.battery || p.vbat;
      
      if (v) {
        let volt = parseFloat(v > 100 ? v / 1000 : v);
        
        // Sanity check: salvestame graafikule ainult reaalseid pingeid (2V - 5V)
        // See väldib null-väärtuste (0) poolt graafiku alla kiskumist
        if (volt >= 2.0 && volt <= 5.0) {
          labels.push(tObj.toLocaleTimeString('et-EE', {hour: '2-digit', minute:'2-digit'}));
          data.push(volt);
          
          if (volt < minVolt) minVolt = volt;
          if (volt > maxVolt) maxVolt = volt;
        }
      }
    }
  });

  // Kui 24h jooksul kehtivaid andmeid polnud, katkestame
  if (data.length === 0) {
    document.getElementById("batteryStats").innerHTML = "Andmed puuduvad";
    return;
  }

  // Uuendame Min/Max HTML teksti
  document.getElementById("batteryStats").innerHTML = `Min: ${minVolt.toFixed(2)}V | Max: ${maxVolt.toFixed(2)}V`;

  // Anname Y-teljele natuke hingamisruumi (et joon ei puutuks graafiku lage/põhja)
  let yMin = Math.max(3.0, Math.floor(minVolt * 10) / 10 - 0.1);
  let yMax = Math.min(4.5, Math.ceil(maxVolt * 10) / 10 + 0.1);

  batteryChartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Pinge (V)",
        data: data,
        borderColor: "#4caf50",
        backgroundColor: "transparent", // Täitevärv puudub
        pointRadius: 0, // Mummud puuduvad
        borderWidth: 1, // Peenike joon
        tension: 0.1 // Õrn kurv (pehmendab nurki)
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { 
          ticks: { color: "#888", maxTicksLimit: 6 }, // Näitame max 6 kellaaega, et mitte üle koormata
          grid: { display: false } // Eemaldame vertikaalsed taustajooned puhtuse huvides
        },
        y: { 
          ticks: { color: "#888" },
          grid: { color: "rgba(255,255,255,0.05)" },
          min: yMin, 
          max: yMax 
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index',
          intersect: false
        }
      }
    }
  });
}
</script>

</body>
</html>
