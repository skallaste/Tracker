<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>GPS Tracker</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBaUv2fqgvvzBKBwqCmZgoKIDM92ASVYWo"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:70vh;
}

#controls{
padding:10px;
background:#f0f0f0;
}

#timeline{
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<div id="controls">

<input type="range" id="timeline" min="0" max="0" value="0">

<div id="speed"></div>

<canvas id="batteryChart"></canvas>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz8VQ5E_QMY-g0vB8lDq254fKsRhqArHqO0MljJfE8Gg8Kd_UVPvFLMoLlqUjVxSJ604g/exec?api=points&points=500";

let map;
let marker;
let routeLine;

let rawPoints=[];
let snappedPath=[];

function init(){

map=new google.maps.Map(document.getElementById("map"),{
zoom:14,
center:{lat:59,lng:25}
});

marker=new google.maps.Marker({map:map});

loadData();

}

async function loadData(){

let cached=localStorage.getItem("gpscache");

if(cached){
rawPoints=JSON.parse(cached);
process();
}

let res=await fetch(API);

rawPoints=await res.json();

localStorage.setItem("gpscache",JSON.stringify(rawPoints));

process();

}

async function process(){

if(rawPoints.length<2)return;

await snapRoute();

drawRoute();

setupTimeline();

calcSpeed();

drawBattery();

}

async function snapRoute(){

let service=new google.maps.DirectionsService();

let waypoints=[];

let step=Math.ceil(rawPoints.length/20);

for(let i=step;i<rawPoints.length-step;i+=step){

waypoints.push({
location:new google.maps.LatLng(rawPoints[i].lat,rawPoints[i].lon),
stopover:false
});

}

let result=await service.route({

origin:new google.maps.LatLng(rawPoints[0].lat,rawPoints[0].lon),

destination:new google.maps.LatLng(rawPoints[rawPoints.length-1].lat,rawPoints[rawPoints.length-1].lon),

waypoints:waypoints,

travelMode:"DRIVING"

});

snappedPath=result.routes[0].overview_path;

}

function drawRoute(){

routeLine=new google.maps.Polyline({

path:snappedPath,

map:map,

strokeColor:"#ff0000",

strokeWeight:4

});

let bounds=new google.maps.LatLngBounds();

snappedPath.forEach(p=>bounds.extend(p));

map.fitBounds(bounds);

}

function setupTimeline(){

let slider=document.getElementById("timeline");

slider.max=snappedPath.length-1;

slider.oninput=function(){

let pos=snappedPath[this.value];

marker.setPosition(pos);

};

animate();

}

function animate(){

let i=0;

setInterval(()=>{

if(i>=snappedPath.length)return;

marker.setPosition(snappedPath[i]);

document.getElementById("timeline").value=i;

i++;

},200);

}

function calcSpeed(){

let speeds=[];

for(let i=1;i<rawPoints.length;i++){

let d=dist(

rawPoints[i-1].lat,

rawPoints[i-1].lon,

rawPoints[i].lat,

rawPoints[i].lon

);

let t=(new Date(rawPoints[i].time)-new Date(rawPoints[i-1].time))/1000;

let s=(d/t)*3.6;

speeds.push(s);

}

let avg=speeds.reduce((a,b)=>a+b,0)/speeds.length;

document.getElementById("speed").innerHTML="Average speed: "+avg.toFixed(1)+" km/h";

}

function dist(lat1,lon1,lat2,lon2){

let R=6371e3;

let φ1=lat1*Math.PI/180;

let φ2=lat2*Math.PI/180;

let Δφ=(lat2-lat1)*Math.PI/180;

let Δλ=(lon2-lon1)*Math.PI/180;

let a=Math.sin(Δφ/2)*Math.sin(Δφ/2)+

Math.cos(φ1)*Math.cos(φ2)*

Math.sin(Δλ/2)*Math.sin(Δλ/2);

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

function drawBattery(){

let ctx=document.getElementById("batteryChart");

let labels=[];

let data=[];

rawPoints.forEach(p=>{

labels.push(p.time);

data.push(p.battery);

});

new Chart(ctx,{

type:"line",

data:{

labels:labels,

datasets:[{

label:"Battery",

data:data

}]

}

});

}

window.onload=init;

</script>

</body>
</html>
