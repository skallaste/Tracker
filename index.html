<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OSM GPS Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial;
}

#map{
height:100%;
width:100%;
}

/* side panel */

#panel{
position:absolute;
right:0;
top:0;
height:100%;
width:60px;
background:rgba(30,30,30,0.65);
color:white;
transition:0.3s;
overflow:hidden;
z-index:1000;
}

#panel.open{
width:320px;
}

#panelHeader{
padding:10px;
cursor:pointer;
}

#timeNow{
font-size:16px;
margin-bottom:8px;
}

#batteryBar{
height:12px;
background:#444;
border-radius:6px;
overflow:hidden;
}

#batteryFill{
height:100%;
background:#4caf50;
width:0%;
}

#content{
padding:15px;
}

.slider{
width:100%;
}

label{
font-size:14px;
}

</style>

</head>
<body>

<div id="map"></div>

<div id="panel">

<div id="panelHeader" onclick="togglePanel()">

<div id="timeNow">--:--</div>

<div id="batteryBar">
<div id="batteryFill"></div>
</div>

</div>

<div id="content">

<label>Ajanihe (30min samm)</label>
<input id="timeSlider" type="range" min="0" max="0" value="0" class="slider">

<div id="timeInfo"></div>

<br>

<label>Punktide arv</label>
<input id="pointsSlider" type="range" min="1" max="500" value="100" class="slider">
<div id="pointsLabel">100</div>

<br>

<label>Päringu intervall (sek)</label>
<input id="refreshSlider" type="range" min="5" max="60" value="10" class="slider">
<div id="refreshLabel">10</div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ============================= */
/* MUUDETAVAD SEADED */
/* ============================= */

const API_URL="AKfycbz8VQ5E_QMY-g0vB8lDq254fKsRhqArHqO0MljJfE8Gg8Kd_UVPvFLMoLlqUjVxSJ604g";

let REFRESH_INTERVAL=10000;

/* ============================= */

let map=L.map('map').setView([58.7,25.0],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let marker=L.marker([58.7,25]).addTo(map);

let routeLine=L.polyline([],{color:'red',weight:4}).addTo(map);

let allPoints=[];

let cached=localStorage.getItem("gps_cache");

if(cached){
allPoints=JSON.parse(cached);
}

function togglePanel(){
document.getElementById("panel").classList.toggle("open");
}

/* ============================= */
/* KELL */
/* ============================= */

function updateClock(){

let d=new Date();

let h=String(d.getHours()).padStart(2,"0");
let m=String(d.getMinutes()).padStart(2,"0");

document.getElementById("timeNow").innerText=h+":"+m;

}

setInterval(updateClock,1000);
updateClock();

/* ============================= */
/* AKU */
/* ============================= */

function updateBattery(v){

let pct=(v-3.3)/(4.2-3.3)*100;

pct=Math.max(0,Math.min(100,pct));

document.getElementById("batteryFill").style.width=pct+"%";

}

/* ============================= */
/* API FETCH */
/* ============================= */

async function loadPoints(){

try{

let limit=document.getElementById("pointsSlider").value;

let res=await fetch(API_URL+"&points="+limit);

let data=await res.json();

if(!data.length)return;

allPoints=data;

localStorage.setItem("gps_cache",JSON.stringify(data));

updateMap();

}catch(e){

console.log("offline");

}

}

setInterval(loadPoints,REFRESH_INTERVAL);
loadPoints();

/* ============================= */
/* OSRM ROUTING */
/* ============================= */

async function route(coords){

let list=coords.map(c=>c[1]+","+c[0]).join(";");

let url="https://router.project-osrm.org/route/v1/driving/"+list+"?overview=full&geometries=geojson";

let res=await fetch(url);

let data=await res.json();

return data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);

}

/* ============================= */
/* MAP UPDATE */
/* ============================= */

async function updateMap(){

if(allPoints.length==0)return;

let offset=document.getElementById("timeSlider").value;

let index=allPoints.length-1-offset;

if(index<0)index=0;

let selected=allPoints[index];

let start=Math.max(0,index-document.getElementById("pointsSlider").value);

let subset=allPoints.slice(start,index+1);

let coords=subset.map(p=>[p.lat,p.lon]);

if(coords.length>1){

let routed=await route(coords);

routeLine.setLatLngs(routed);

}

marker.setLatLng([selected.lat,selected.lon]);

map.setView([selected.lat,selected.lon],14);

updateBattery(selected.battery);

updateTimeInfo(selected.time,offset);

}

/* ============================= */
/* TIME INFO */
/* ============================= */

function updateTimeInfo(lastTime,offset){

let t=new Date(lastTime);

let h=String(t.getHours()).padStart(2,"0");
let m=String(t.getMinutes()).padStart(2,"0");

let back=offset*0.5;

document.getElementById("timeInfo").innerText=
"Viimane punkt: "+h+":"+m+
"\nTagasi: "+back+"h";

}

/* ============================= */
/* SLIDERS */
/* ============================= */

document.getElementById("pointsSlider").oninput=function(){

document.getElementById("pointsLabel").innerText=this.value;

updateMap();

};

document.getElementById("refreshSlider").oninput=function(){

document.getElementById("refreshLabel").innerText=this.value;

REFRESH_INTERVAL=this.value*1000;

};

document.getElementById("timeSlider").oninput=function(){

updateMap();

};

/* ============================= */
/* TIME SLIDER MAX */
/* ============================= */

function updateSlider(){

let max=Math.floor(allPoints.length/60);

document.getElementById("timeSlider").max=max;

}

setInterval(updateSlider,5000);

</script>

</body>
</html>
