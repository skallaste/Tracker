<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>GPS Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map{
height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbz8VQ5E_QMY-g0vB8lDq254fKsRhqArHqO0MljJfE8Gg8Kd_UVPvFLMoLlqUjVxSJ604g/exec?api=points&points=100";

const map = L.map('map').setView([59.437, 24.753], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let marker;
let polyline;

async function loadData(){

const response = await fetch(sheetURL);
const data = await response.json();

const points = [];

data.forEach(row=>{
points.push([parseFloat(row.lat), parseFloat(row.lon)]);
});

if(points.length === 0) return;

const last = points[points.length-1];

if(!marker){
marker = L.marker(last).addTo(map);
}else{
marker.setLatLng(last);
}

if(polyline){
map.removeLayer(polyline);
}

polyline = L.polyline(points,{color:'red'}).addTo(map);

map.setView(last,15);

}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
