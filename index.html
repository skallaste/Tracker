<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>GPS Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

#panel{
position:absolute;
top:10px;
left:50px;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
z-index:1000;
}

</style>

</head>

<body>

<div id="panel">

<b>GPS Tracker</b><br>

Points: <input id="points" value="80" size="4">

<button onclick="loadData()">Refresh</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// GOOGLE SCRIPT API
const apiBase =
"https://script.google.com/macros/s/AKfycbz8VQ5E_QMY-g0vB8lDq254fKsRhqArHqO0MljJfE8Gg8Kd_UVPvFLMoLlqUjVxSJ604g/exec";

const map = L.map('map').setView([59.437,24.753],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}).addTo(map);

let marker = null;
let trackLine = null;
let firstLoad = true;


// SNAP GPS PUNKTID TEEDELE
async function snapToRoad(coords){

try{

// OSRM lubab max ~100 punkti
if(coords.length > 100){
coords = coords.slice(coords.length-100);
}

let coordString = coords
.map(c => c[1] + "," + c[0])
.join(";");

let url =
"https://router.project-osrm.org/match/v1/driving/"
+ coordString
+ "?overview=full&geometries=geojson";

const res = await fetch(url);
const json = await res.json();

if(json.code !== "Ok"){

console.log("OSRM fallback");
return coords;

}

const snapped = json.matchings[0].geometry.coordinates;

return snapped.map(c => [c[1],c[0]]);

}catch(e){

console.log("match error",e);
return coords;

}

}


// ANDMETE LAADIMINE
async function loadData(){

let points = parseInt(document.getElementById("points").value);

// OSRM piirang
if(points > 100){
points = 100;
document.getElementById("points").value = 100;
}

const url = apiBase + "?api=points&points=" + points;

try{

const response = await fetch(url);
const data = await response.json();

if(!data || data.length === 0) return;

const coords = [];

data.forEach(p=>{
coords.push([p.lat,p.lon]);
});

// SNAP TEEDELE
const snappedCoords = await snapToRoad(coords);

const last = snappedCoords[snappedCoords.length-1];


// MARKER
if(!marker){

marker = L.marker(last).addTo(map);

}else{

marker.setLatLng(last);

}

let lastPoint = data[data.length-1];

marker.bindPopup(
"<b>GPS Tracker</b>" +
"<br>Time: " + lastPoint.time +
"<br>Battery: " + lastPoint.battery +
"<br>Signal: " + lastPoint.signal +
"<br>Status: " + lastPoint.status
);


// TRAJEKTOOR
if(trackLine){
map.removeLayer(trackLine);
}

trackLine = L.polyline(snappedCoords,{
color:"red",
weight:4
}).addTo(map);


// ZOOM ainult esimesel laadimisel
if(firstLoad){

map.setView(last,15);
firstLoad = false;

}

}catch(e){

console.log("API error",e);

}

}


// ESIMENE LAADIMINE
loadData();

// AUTO REFRESH
setInterval(loadData,5000);

</script>

</body>

</html>
